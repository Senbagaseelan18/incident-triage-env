<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Triage Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        select, input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
            width: 100%;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 30px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            border-left: 5px solid #28a745;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border-left: 5px solid #dc3545;
            color: #721c24;
        }
        
        .result.warning {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
        }
        
        .reward-display {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
        }
        
        .grader-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .grader-item {
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            background: #f9f9f9;
        }
        
        .grader-item.correct {
            background: #d4edda;
            color: #28a745;
        }
        
        .grader-item.incorrect {
            background: #f8d7da;
            color: #dc3545;
        }
        
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .sidebar h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚨 Incident Triage Management System</h1>
            <p class="subtitle">Interactive AI Training Environment</p>
        </header>
        
        <div class="sidebar">
            <h3>⚙️ API Status</h3>
            <div id="statusIndicator" style="padding: 10px; border-radius: 5px; background: #f8d7da; color: #721c24;">
                🔄 Checking...
            </div>
        </div>
        
        <div class="main">
            <!-- Left Column - Incident Details -->
            <div class="card">
                <h2>📋 Incident Details</h2>
                
                <div class="form-group">
                    <label>Incident ID</label>
                    <input type="text" id="incidentId" readonly value="N/A">
                </div>
                
                <div class="form-group">
                    <label>Service Affected</label>
                    <input type="text" id="serviceAffected" readonly value="N/A">
                </div>
                
                <div class="form-group">
                    <label>Incident Description</label>
                    <textarea id="incidentText" readonly>Click "New Incident" to load an incident...</textarea>
                </div>
                
                <button onclick="loadNewIncident()">🔄 New Incident</button>
                
                <div class="stats" id="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalEpisodes">0</div>
                        <div class="stat-label">Episodes</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="avgReward">0.00</div>
                        <div class="stat-label">Avg Reward</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="maxReward">0.00</div>
                        <div class="stat-label">Best</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalReward">0.00</div>
                        <div class="stat-label">Total Reward</div>
                    </div>
                </div>
            </div>
            
            <!-- Right Column - Triage Decision -->
            <div class="card">
                <h2>🤖 Triage Decision</h2>
                
                <div class="form-group">
                    <label>Task Difficulty</label>
                    <select id="taskId" onchange="updateTaskInfo()">
                        <option value="task_easy">🟢 Easy - Severity Only</option>
                        <option value="task_medium">🟡 Medium - Severity + Routing</option>
                        <option value="task_hard">🔴 Hard - Full Pipeline</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Severity Level</label>
                    <select id="severity">
                        <option value="">-- Select --</option>
                        <option value="low">🟢 LOW</option>
                        <option value="medium">🟡 MEDIUM</option>
                        <option value="high">🟠 HIGH</option>
                        <option value="critical">🔴 CRITICAL</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Route to Team</label>
                    <select id="team">
                        <option value="">-- Select --</option>
                        <option value="database">🗄️ Database</option>
                        <option value="network">🌐 Network</option>
                        <option value="support">👨‍💼 Support</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Priority</label>
                    <select id="priority">
                        <option value="">-- Select --</option>
                        <option value="p1">🚨 P1 (Urgent)</option>
                        <option value="p2">⚠️ P2 (High)</option>
                        <option value="p3">📋 P3 (Low)</option>
                    </select>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="escalate">
                    <label for="escalate" style="margin: 0;">Escalate Decision</label>
                </div>
                
                <button onclick="submitDecision()" style="margin-top: 30px;">✅ Submit Decision</button>
                
                <div id="resultContainer"></div>
                
                <div id="loadingContainer" class="loading">
                    <div class="spinner"></div>
                    <p>Processing...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = "https://senbagaseelanv-incident-triage-env.hf.space";
        let episodeHistory = [];
        
        // Initialize
        window.addEventListener('load', () => {
            checkAPIStatus();
            updateStats();
        });
        
        async function checkAPIStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const statusDiv = document.getElementById('statusIndicator');
                if (response.ok) {
                    statusDiv.textContent = '✅ API Connected';
                    statusDiv.style.background = '#d4edda';
                    statusDiv.style.color = '#155724';
                } else {
                    showStatus('❌ API Error', 'error');
                }
            } catch (error) {
                showStatus('❌ Connection Failed', 'error');
            }
        }
        
        async function loadNewIncident() {
            showLoading(true);
            try {
                const taskId = document.getElementById('taskId').value;
                const response = await fetch(`${API_BASE_URL}/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const obs = data.observation;
                    
                    // Display incident details
                    document.getElementById('incidentId').value = obs.incident_id;
                    document.getElementById('incidentText').value = obs.incident_text;
                    document.getElementById('serviceAffected').value = obs.service_affected;
                    
                    // Reset form
                    document.getElementById('severity').value = '';
                    document.getElementById('team').value = '';
                    document.getElementById('priority').value = '';
                    document.getElementById('escalate').checked = false;
                    
                    // Clear result
                    document.getElementById('resultContainer').innerHTML = '';
                    
                    showLoading(false);
                } else {
                    showStatus('Failed to load incident', 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
            showLoading(false);
        }
        
        async function submitDecision() {
            // Validate
            if (!document.getElementById('severity').value ||
                !document.getElementById('team').value ||
                !document.getElementById('priority').value) {
                showStatus('Please fill all fields', 'warning');
                return;
            }
            
            showLoading(true);
            
            try {
                const action = {
                    severity: document.getElementById('severity').value,
                    team: document.getElementById('team').value,
                    priority: document.getElementById('priority').value,
                    escalate: document.getElementById('escalate').checked
                };
                
                const response = await fetch(`${API_BASE_URL}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action })
                });
                
                if (response.ok) {
                    const result = response.json();
                    result.then(data => {
                        const reward = data.reward;
                        const grader = data.info.grader_result;
                        
                        // Add to history
                        episodeHistory.push({
                            reward: reward,
                            action: action,
                            grader: grader
                        });
                        
                        // Display result
                        displayResult(reward, grader);
                        updateStats();
                    });
                } else {
                    showStatus('Failed to submit decision', 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
            showLoading(false);
        }
        
        function displayResult(reward, grader) {
            const resultHtml = `
                <div class="result ${reward > 0.7 ? 'success' : reward > 0.3 ? 'warning' : 'error'}">
                    <div class="reward-display">${reward.toFixed(2)}</div>
                    <div class="grader-grid">
                        <div class="grader-item ${grader.severity_correct ? 'correct' : 'incorrect'}">
                            ${grader.severity_correct ? '✅' : '❌'} Severity
                        </div>
                        <div class="grader-item ${grader.team_correct ? 'correct' : 'incorrect'}">
                            ${grader.team_correct ? '✅' : '❌'} Team
                        </div>
                        <div class="grader-item ${grader.priority_correct ? 'correct' : 'incorrect'}">
                            ${grader.priority_correct ? '✅' : '❌'} Priority
                        </div>
                        <div class="grader-item ${grader.escalation_correct ? 'correct' : 'incorrect'}">
                            ${grader.escalation_correct ? '✅' : '❌'} Escalation
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('resultContainer').innerHTML = resultHtml;
        }
        
        function updateStats() {
            const total = episodeHistory.length;
            const totalReward = episodeHistory.reduce((sum, e) => sum + e.reward, 0);
            const avgReward = total > 0 ? totalReward / total : 0;
            const maxReward = total > 0 ? Math.max(...episodeHistory.map(e => e.reward)) : 0;
            
            document.getElementById('totalEpisodes').textContent = total;
            document.getElementById('avgReward').textContent = avgReward.toFixed(2);
            document.getElementById('maxReward').textContent = maxReward.toFixed(2);
            document.getElementById('totalReward').textContent = totalReward.toFixed(2);
        }
        
        function updateTaskInfo() {
            // Could add task-specific info here
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusIndicator');
            statusDiv.textContent = message;
            statusDiv.style.background = type === 'error' ? '#f8d7da' : '#fff3cd';
            statusDiv.style.color = type === 'error' ? '#721c24' : '#856404';
        }
        
        function showLoading(show) {
            document.getElementById('loadingContainer').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
